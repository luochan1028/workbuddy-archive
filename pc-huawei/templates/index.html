<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Terminal — 全球投资情报终端</title>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — Professional Terminal
   ═══════════════════════════════════════════════════ */
:root {
  --bg-deep: #070a13;
  --bg-surface: #0d111d;
  --bg-card: #111827;
  --bg-card-hover: #161e30;
  --bg-glass: rgba(17,24,39,0.85);
  --border-subtle: #1a2335;
  --border-card: #1e2a40;
  --border-active: #253352;
  --text-primary: #e8edf5;
  --text-secondary: #8892a8;
  --text-muted: #4d5770;
  --accent: #00c2ff;
  --accent-2: #6c5ce7;
  --accent-glow: rgba(0,194,255,0.12);
  --bull: #ef4444;
  --bull-bg: rgba(239,68,68,0.1);
  --bear: #22c55e;
  --bear-bg: rgba(34,197,94,0.1);
  --warn: #f59e0b;
  --warn-bg: rgba(245,158,11,0.1);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.5);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --sidebar-w: 220px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: 
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,194,255,0.025) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(108,92,231,0.025) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-card); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

/* ═══════════════════════════════════════════════════
   LAYOUT — Sidebar + Main
   ═══════════════════════════════════════════════════ */
.layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.sidebar-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border-subtle);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 12px rgba(0,194,255,0.3);
}
.sidebar-logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
.sidebar-logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: 1px; text-transform: uppercase; }

.sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
.sidebar-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition);
  border: 1px solid transparent; position: relative;
}
.sidebar-nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
.sidebar-nav-item.active {
  color: var(--accent); background: var(--accent-glow);
  border-color: rgba(0,194,255,0.2);
}
.sidebar-nav-item .nav-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.sidebar-nav-item .nav-badge {
  margin-left: auto; font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: var(--accent-glow); color: var(--accent); font-weight: 600;
}
.sidebar-nav-item.active .nav-badge { background: rgba(0,194,255,0.25); }

.sidebar-footer {
  padding: 14px 16px; border-top: 1px solid var(--border-subtle);
}
.sidebar-status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }
.sidebar-status-dot { width: 7px; height: 7px; border-radius: 50%; }
.sidebar-status-dot.live { background: var(--bear); box-shadow: 0 0 6px rgba(34,197,94,0.6); animation: statusPulse 2s ease infinite; }
.sidebar-status-dot.offline { background: var(--text-muted); }
@keyframes statusPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ── Main Content ── */
.main { margin-left: var(--sidebar-w); flex: 1; min-width: 0; }

/* ── Top Bar ── */
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 28px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  position: sticky; top: 0; z-index: 5;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  gap: 16px;
}
.topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
.topbar-title .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bear); display: inline-block; animation: statusPulse 2s ease infinite; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-right input[type="date"] {
  padding: 7px 14px; border: 1px solid var(--border-card); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text-primary); font-size: 13px; font-family: var(--font);
  outline: none; transition: border var(--transition);
}
.topbar-right input[type="date"]:focus { border-color: var(--accent); }

.btn {
  padding: 8px 18px; border: 1px solid var(--border-card); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text-secondary); font-size: 13px; cursor: pointer;
  font-family: var(--font); font-weight: 500;
  transition: all var(--transition); white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { border-color: var(--border-active); color: var(--text-primary); background: var(--bg-card-hover); }
.btn-accent {
  background: linear-gradient(135deg, var(--accent), #0098cc);
  border-color: transparent; color: #fff; font-weight: 600;
  box-shadow: 0 2px 10px rgba(0,194,255,0.25);
}
.btn-accent:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,194,255,0.35); }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: rgba(255,255,255,0.04); }

/* ═══════════════════════════════════════════════════
   CONTENT AREA
   ═══════════════════════════════════════════════════ */
.content { padding: 24px 28px; }
.view-panel { display: none; animation: fadeSlideIn 0.35s ease; }
.view-panel.active { display: block; }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════════════════
   CARDS
   ═══════════════════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.card:hover { border-color: rgba(255,255,255,0.06); }
.card-accent { border-left: 3px solid var(--accent); }
.card-header {
  padding: 15px 20px; border-bottom: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.01);
}
.card-header h3 { font-size: 13px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 7px; letter-spacing: 0.3px; text-transform: uppercase; }
.card-body { padding: 20px; }
.card-body-flush { padding: 0; }

/* ═══════════════════════════════════════════════════
   STATS ROW
   ═══════════════════════════════════════════════════ */
.stats-row {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 14px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-lg); padding: 18px 20px;
  transition: all var(--transition);
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0; transition: opacity var(--transition);
}
.stat-card:hover { border-color: var(--border-active); }
.stat-card:hover::before { opacity: 1; }
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); letter-spacing: -1px; }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ═══════════════════════════════════════════════════
   BRIEFING HERO
   ═══════════════════════════════════════════════════ */
.briefing-hero {
  background: linear-gradient(135deg, rgba(0,194,255,0.06) 0%, rgba(108,92,231,0.04) 100%);
  border: 1px solid var(--border-card); border-radius: var(--radius-lg);
  padding: 24px 28px; margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.briefing-hero::after {
  content: ''; position: absolute; top: -50%; right: -10%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(0,194,255,0.06) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.briefing-headline { font-size: 21px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; line-height: 1.4; position: relative; z-index: 1; }
.briefing-summary { font-size: 13.5px; color: var(--text-secondary); line-height: 1.9; white-space: pre-line; position: relative; z-index: 1; }
.briefing-date { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════════
   TWO COLUMN
   ═══════════════════════════════════════════════════ */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* ═══════════════════════════════════════════════════
   SIGNAL BARS
   ═══════════════════════════════════════════════════ */
.signal-bar-item { margin-bottom: 14px; }
.signal-bar-item:last-child { margin-bottom: 0; }
.signal-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 12px; }
.signal-bar-name { font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 5px; }
.signal-bar-count { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
.signal-bar-track { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.04); overflow: hidden; }
.signal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); position: relative; }
.signal-bar-fill::after {
  content: ''; position: absolute; top: 0; right: 0; width: 30px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25));
}

/* ═══════════════════════════════════════════════════
   RISK ALERTS
   ═══════════════════════════════════════════════════ */
.risk-item {
  padding: 12px 14px; margin-bottom: 8px;
  border-radius: var(--radius-sm);
  background: var(--bull-bg);
  border: 1px solid rgba(239,68,68,0.15);
  cursor: pointer; transition: all var(--transition);
  position: relative;
}
.risk-item:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); transform: translateX(2px); }
.risk-item:last-child { margin-bottom: 0; }
.risk-item .risk-pulse {
  position: absolute; left: -1px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%; background: var(--bull); border-radius: 2px;
  animation: statusPulse 1.5s ease infinite;
}
.risk-source { font-weight: 600; color: var(--bull); font-size: 11px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.risk-source .risk-link-icon { font-size: 9px; opacity: 0.5; margin-left: auto; }
.risk-excerpt { color: var(--text-secondary); font-size: 12px; line-height: 1.5; }
.risk-safe { text-align: center; padding: 24px; color: var(--bear); font-size: 13px; }
.risk-safe .safe-icon { font-size: 28px; display: block; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════
   SECTOR HEATMAP
   ═══════════════════════════════════════════════════ */
.heatmap-grid { overflow-x: auto; }
.heatmap-grid table { border-collapse: collapse; width: 100%; }
.heatmap-grid th {
  padding: 10px 14px; text-align: center; font-weight: 600; font-size: 11px;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-subtle); white-space: nowrap;
}
.heatmap-grid th:first-child { text-align: left; min-width: 100px; }
.heatmap-grid td { padding: 8px 14px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); }
.heatmap-grid td:first-child { text-align: left; font-weight: 600; font-size: 12px; color: var(--text-primary); }
.heat-cell {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 56px; height: 32px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 700; font-family: var(--font-mono);
  border: 1px solid transparent; transition: all var(--transition);
}
.heat-cell:hover { transform: scale(1.1); z-index: 1; }
.heat-legend { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); align-items: center; }
.heat-legend span { display: flex; align-items: center; gap: 4px; }
.heat-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* ═══════════════════════════════════════════════════
   TWEET LIST
   ═══════════════════════════════════════════════════ */
.tweet-card {
  padding: 18px 20px; border-bottom: 1px solid var(--border-subtle);
  transition: all var(--transition); position: relative;
}
.tweet-card:last-child { border-bottom: none; }
.tweet-card:hover { background: rgba(255,255,255,0.015); }
.tweet-card.signal-high {
  border-left: 3px solid var(--accent);
  background: linear-gradient(90deg, rgba(0,194,255,0.03) 0%, transparent 30%);
}
.tweet-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.tweet-account {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 15px;
  background: rgba(0,194,255,0.08); color: var(--accent);
  font-size: 12px; font-weight: 600;
}
.tweet-account-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.tweet-sentiment { font-size: 12px; }
.tweet-time { font-size: 11px; color: var(--text-muted); margin-left: auto; font-family: var(--font-mono); }
.tweet-content-en { font-size: 14px; line-height: 1.75; color: var(--text-primary); margin-bottom: 6px; }
.tweet-content-zh {
  font-size: 13px; line-height: 1.7; color: var(--text-secondary);
  border-left: 2px solid rgba(108,92,231,0.4); padding: 8px 12px;
  margin: 10px 0; background: rgba(108,92,231,0.03);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.tweet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.tag {
  padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 3px;
}
.tag-signal { border: 1px solid; }
.tag-sector { border: 1px solid; border-radius: 12px; }
.tweet-interpretation {
  font-size: 12.5px; line-height: 1.7; color: #fbbf24;
  background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.15);
  border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 10px;
  display: flex; align-items: flex-start; gap: 6px;
}
.tweet-link { margin-top: 8px; }
.tweet-link a { color: var(--text-muted); text-decoration: none; font-size: 11px; transition: color var(--transition); display: inline-flex; align-items: center; gap: 4px; }
.tweet-link a:hover { color: var(--accent); }

/* Highlight animation */
@keyframes highlightTweet {
  0% { background: rgba(0,194,255,0.12); box-shadow: inset 0 0 30px rgba(0,194,255,0.15); }
  100% { background: transparent; box-shadow: none; }
}
.tweet-card.flash { animation: highlightTweet 2.5s ease; }

/* ═══════════════════════════════════════════════════
   PATTERN TRACKER
   ═══════════════════════════════════════════════════ */
.pattern-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.pattern-card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-lg); padding: 20px;
  transition: all var(--transition); position: relative; overflow: hidden;
}
.pattern-card:hover { border-color: var(--border-active); }
.pattern-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.pattern-card-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.pattern-card-period { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.03); padding: 3px 8px; border-radius: 4px; }
.pattern-score { font-size: 36px; font-weight: 800; font-family: var(--font-mono); letter-spacing: -2px; margin-bottom: 6px; }
.pattern-status-text { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.pattern-trend-text { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }
.pattern-gauge {
  height: 5px; border-radius: 3px; background: rgba(255,255,255,0.06);
  margin-bottom: 14px; overflow: hidden;
}
.pattern-gauge-fill { height: 100%; border-radius: 3px; transition: width 0.7s cubic-bezier(0.22,1,0.36,1); }
.pattern-events { margin-top: 10px; }
.pattern-event {
  padding: 7px 10px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.02); margin-bottom: 5px;
  font-size: 11px; color: var(--text-secondary);
  border-left: 2px solid rgba(255,255,255,0.06);
  transition: border-color var(--transition);
}
.pattern-event:hover { border-left-color: var(--accent); }
.pattern-event .pe-date { color: var(--text-muted); font-size: 10px; font-family: var(--font-mono); }
.pattern-event .pe-source { font-weight: 600; color: var(--text-primary); }

/* ═══════════════════════════════════════════════════
   PROFILES
   ═══════════════════════════════════════════════════ */
.profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.profile-card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-lg); padding: 22px;
  transition: all var(--transition);
}
.profile-card:hover { border-color: var(--border-active); }
.profile-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.profile-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.profile-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.profile-handle { font-size: 12px; color: var(--text-muted); }
.profile-stats-row { display: flex; gap: 20px; margin-bottom: 16px; font-size: 12px; color: var(--text-secondary); }
.profile-stats-row span { display: flex; align-items: center; gap: 4px; }
.profile-domain { margin-bottom: 8px; }
.profile-domain-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; color: var(--text-muted); }
.profile-domain-bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.04); overflow: hidden; }
.profile-domain-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.profile-stance {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: 600;
  margin-top: 12px;
}

/* ═══════════════════════════════════════════════════
   RESONANCE
   ═══════════════════════════════════════════════════ */
.resonance-item {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;
  transition: all var(--transition);
}
.resonance-item:hover { border-color: var(--border-active); }
.resonance-item.strong { border-left: 3px solid var(--bull); }
.resonance-item.medium { border-left: 3px solid var(--warn); }
.resonance-item.weak { border-left: 3px solid rgba(255,255,255,0.1); }
.resonance-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.resonance-topic-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.resonance-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
}
.resonance-badge.strong { background: var(--bull-bg); color: var(--bull); }
.resonance-badge.medium { background: var(--warn-bg); color: var(--warn); }
.resonance-badge.weak { background: rgba(255,255,255,0.04); color: var(--text-muted); }
.resonance-accounts { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.resonance-acc-chip {
  padding: 4px 12px; border-radius: 15px;
  background: var(--accent-glow); color: var(--accent);
  font-size: 12px; font-weight: 600;
}

/* ═══════════════════════════════════════════════════
   LOADING STATES
   ═══════════════════════════════════════════════════ */
.skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-text { height: 14px; margin-bottom: 8px; }
.skeleton-text.short { width: 60%; }
.skeleton-text.medium { width: 80%; }

.loading-center { display: flex; justify-content: center; align-items: center; padding: 60px 20px; flex-direction: column; gap: 12px; }
.loading-spinner {
  width: 32px; height: 32px; border: 3px solid var(--border-card);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-muted); }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; display: block; }
.empty-state p { font-size: 14px; }

/* ═══════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  justify-content: center; align-items: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-xl); padding: 28px; width: 440px; max-width: 92vw;
  box-shadow: var(--shadow-lg); animation: modalIn 0.25s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal h3 { font-size: 16px; margin-bottom: 18px; color: var(--text-primary); }
.modal input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border-card);
  border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-primary);
  font-size: 13px; font-family: var(--font); outline: none; transition: border var(--transition);
}
.modal input:focus { border-color: var(--accent); }
.modal-row { display: flex; gap: 10px; margin-bottom: 14px; }
.modal-row input { flex: 1; margin-bottom: 0; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.acc-list-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 12px; background: rgba(255,255,255,0.02);
  border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px;
  border: 1px solid transparent; transition: all var(--transition);
}
.acc-list-item:hover { border-color: var(--border-card); background: rgba(255,255,255,0.03); }
.acc-list-item .acc-del {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 16px; padding: 2px 6px; transition: color var(--transition);
}
.acc-list-item .acc-del:hover { color: var(--bull); }

/* ═══════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════ */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; animation: toastIn 0.3s ease;
  border: 1px solid; box-shadow: var(--shadow-lg); max-width: 360px;
}
.toast.success { background: var(--bear-bg); border-color: rgba(34,197,94,0.3); color: var(--bear); }
.toast.error { background: var(--bull-bg); border-color: rgba(239,68,68,0.3); color: var(--bull); }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

/* ═══════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════ */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .two-col { grid-template-columns: 1fr; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; }
  .content { padding: 16px; }
  .profile-grid, .pattern-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">

<!-- ═══════════════════════════════════════════════════
     SIDEBAR
     ═══════════════════════════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">II</div>
      <div>
        <div class="sidebar-logo-text">情报终端</div>
        <div class="sidebar-logo-sub">Terminal</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-nav-item active" data-view="dashboard" onclick="switchView('dashboard', this)">
      <span class="nav-icon">⊞</span> 情报看板
      <span class="nav-badge" id="navCount">--</span>
    </div>
    <div class="sidebar-nav-item" data-view="patterns" onclick="switchView('patterns', this)">
      <span class="nav-icon">◉</span> 格局追踪
    </div>
    <div class="sidebar-nav-item" data-view="profiles" onclick="switchView('profiles', this)">
      <span class="nav-icon">◷</span> 账号画像
    </div>
    <div class="sidebar-nav-item" data-view="resonance" onclick="switchView('resonance', this)">
      <span class="nav-icon">◎</span> 主题共振
    </div>
  </nav>

  <div style="flex:1;"></div>

  <div class="sidebar-footer">
    <div class="sidebar-status">
      <span class="sidebar-status-dot live" id="statusDot"></span>
      <span id="statusText">系统运行中</span>
    </div>
  </div>
</aside>

<!-- ═══════════════════════════════════════════════════
     MAIN
     ═══════════════════════════════════════════════════ -->
<main class="main">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-title">
      <span id="viewTitle">情报看板</span>
      <span class="live-dot" title="实时连接"></span>
    </div>
    <div class="topbar-right">
      <input type="date" id="datePicker" title="选择日期">
      <button class="btn btn-accent" onclick="refreshAll()">⟳ 刷新</button>
      <button class="btn btn-ghost" onclick="openAccountManager()">⚙ 账号</button>
      <button class="btn btn-ghost" onclick="toggleTranslation()" id="btnTranslate" title="切换翻译显示">文A</button>
    </div>
  </div>

  <div class="content">

    <!-- ═══ View: Dashboard ═══ -->
    <div class="view-panel active" id="view-dashboard">
      <!-- Stats Row -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-label">Total Tweets</div><div class="stat-value" id="statTotal">--</div><div class="stat-sub">今日捕获</div></div>
        <div class="stat-card"><div class="stat-label">Signals Detected</div><div class="stat-value" id="statSignals">--</div><div class="stat-sub">投资信号</div></div>
        <div class="stat-card"><div class="stat-label">Accounts Active</div><div class="stat-value" id="statAccounts">--</div><div class="stat-sub">活跃账号</div></div>
        <div class="stat-card"><div class="stat-label">Sectors Impacted</div><div class="stat-value" id="statSectors">--</div><div class="stat-sub">板块受影响</div></div>
      </div>

      <!-- Briefing Hero -->
      <div class="briefing-hero" id="briefingHero">
        <div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载情报简报...</div></div>
      </div>

      <!-- Two Column: Signals + Risks -->
      <div class="two-col">
        <div class="card">
          <div class="card-header"><h3>≣ 投资信号分布</h3></div>
          <div class="card-body" id="signalDist"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>⚠ 风险预警</h3><span style="font-size:11px;color:var(--text-muted);">点击跳转</span></div>
          <div class="card-body" id="riskPanel" style="max-height:280px;overflow-y:auto;"></div>
        </div>
      </div>

      <!-- Sector Heatmap -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-header">
          <h3>⊡ 板块影响矩阵</h3>
          <div class="heat-legend">
            <span><span class="heat-legend-dot" style="background:var(--bull);"></span>利好</span>
            <span><span class="heat-legend-dot" style="background:var(--bear);"></span>利空</span>
            <span><span class="heat-legend-dot" style="background:var(--text-muted);"></span>中性</span>
          </div>
        </div>
        <div class="card-body heatmap-grid" id="sectorHeatmap"></div>
      </div>

      <!-- Tweet Feed -->
      <div class="card">
        <div class="card-header">
          <h3>☰ 推文情报流</h3>
          <span style="font-size:11px;color:var(--text-muted);" id="tweetCount">--</span>
        </div>
        <div class="card-body-flush" id="tweetList"></div>
      </div>
    </div>

    <!-- ═══ View: Patterns ═══ -->
    <div class="view-panel" id="view-patterns">
      <div class="pattern-grid" id="patternGrid">
        <div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载格局数据...</div></div>
      </div>
    </div>

    <!-- ═══ View: Profiles ═══ -->
    <div class="view-panel" id="view-profiles">
      <div class="profile-grid" id="profileGrid">
        <div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载账号画像...</div></div>
      </div>
    </div>

    <!-- ═══ View: Resonance ═══ -->
    <div class="view-panel" id="view-resonance">
      <div id="resonancePanel">
        <div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">分析主题共振...</div></div>
      </div>
    </div>

  </div><!-- /content -->
</main>

</div><!-- /layout -->

<!-- Account Modal -->
<div class="modal-overlay" id="accountModal">
  <div class="modal">
    <h3>账号管理</h3>
    <div class="modal-row">
      <input type="text" id="newAccount" placeholder="输入 X 用户名（不含 @）">
      <button class="btn btn-accent" onclick="addAccount()">添加</button>
    </div>
    <div id="accountList" style="max-height:320px;overflow-y:auto;"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAccountManager()">关闭</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let showZh = true;
let accounts = [];
let currentData = null;
let currentView = 'dashboard';

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];
document.getElementById('datePicker').addEventListener('change', () => refreshAll());
loadAccounts().then(() => refreshAll());

// Health check every 30s
setInterval(async () => {
  try { const r = await fetch('/api/health'); const d = await r.json();
    const dot = document.getElementById('statusDot');
    dot.className = 'sidebar-status-dot ' + (d.status==='ok'?'live':'offline');
    document.getElementById('statusText').textContent = d.status==='ok'?'系统运行中':'服务异常';
  } catch(e) { document.getElementById('statusDot').className = 'sidebar-status-dot offline'; document.getElementById('statusText').textContent = '连接断开'; }
}, 30000);

// ═══════════════════════════════════════════════
// VIEW NAVIGATION
// ═══════════════════════════════════════════════
function switchView(name, el) {
  currentView = name;
  document.querySelectorAll('.sidebar-nav-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('view-' + name);
  if (panel) panel.classList.add('active');
  const titles = {dashboard:'情报看板', patterns:'格局追踪', profiles:'账号画像', resonance:'主题共振'};
  document.getElementById('viewTitle').textContent = titles[name] || name;
  if (name === 'patterns') loadPatterns();
  else if (name === 'profiles') loadProfiles();
  else if (name === 'resonance') loadResonance();
}

// ═══════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════
async function loadAccounts() {
  try { const r = await fetch('/api/accounts'); const d = await r.json(); accounts = d.accounts; }
  catch(e) { accounts = []; }
}

async function refreshAll() {
  const date = document.getElementById('datePicker').value;
  document.getElementById('briefingHero').innerHTML = '<div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载情报数据...</div></div>';
  document.getElementById('signalDist').innerHTML = '<div class="skeleton skeleton-text medium"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div>';
  document.getElementById('sectorHeatmap').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;"><div class="loading-spinner" style="margin:0 auto 12px;"></div>加载板块矩阵...</div>';
  document.getElementById('tweetList').innerHTML = '<div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载推文...</div></div>';
  document.getElementById('riskPanel').innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">分析中...</div>';

  try { const r = await fetch('/api/intel?date=' + date); currentData = await r.json(); }
  catch(e) { document.getElementById('briefingHero').innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>数据加载失败，请检查服务状态</p></div>'; toast('数据加载失败', 'error'); return; }

  renderBriefing(currentData.briefing);
  renderStats(currentData);
  renderSignals(currentData.briefing.top_signals || []);
  renderSectorHeatmap(currentData.sector_heatmap);
  renderTweets(currentData.tweets || []);
  renderRisks(currentData.briefing.risk_alerts || []);
  document.getElementById('tweetCount').textContent = '共 ' + (currentData.total || 0) + ' 条';
  document.getElementById('navCount').textContent = currentData.total || '--';
  toast('数据已刷新', 'success');
}

// ═══════════════════════════════════════════════
// BRIEFING
// ═══════════════════════════════════════════════
function renderBriefing(b) {
  const el = document.getElementById('briefingHero');
  if (!b || b.headline === '今日暂无推文数据') {
    el.innerHTML = '<div class="briefing-date">' + (currentData?.date||'') + '</div><div class="briefing-headline" style="color:var(--text-muted);">今日暂无推文数据</div><div class="briefing-summary">监控服务正在初始化，或今日各账号暂无新推文。</div>';
    return;
  }
  el.innerHTML = '<div class="briefing-date">' + escHtml(currentData.date) + '</div><div class="briefing-headline">' + escHtml(b.headline) + '</div><div class="briefing-summary">' + b.summary + '</div>';
}

// ═══════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════
function renderStats(data) {
  animateCounter('statTotal', data.total || 0);
  const signalCount = data.briefing?.top_signals?.reduce((s,c) => s + c.count, 0) || 0;
  animateCounter('statSignals', signalCount);
  animateCounter('statAccounts', data.accounts_monitored || 0);
  const sectorCount = data.sector_heatmap?.sectors?.filter(function(s) { return s.total_impact !== 0; }).length || 0;
  document.getElementById('statSectors').textContent = sectorCount;
}

function animateCounter(id, target) {
  const el = document.getElementById(id);
  const start = parseInt(el.textContent) || 0;
  if (start === target) { el.textContent = target; return; }
  const duration = 600, startTime = performance.now();
  function step(ts) { const p = Math.min((ts-startTime)/duration, 1); el.textContent = Math.round(start+(target-start)*(1-Math.pow(1-p,3))); if (p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════
// SIGNAL DISTRIBUTION
// ═══════════════════════════════════════════════
function renderSignals(signals) {
  const el = document.getElementById('signalDist');
  if (!signals.length) { el.innerHTML = '<div class="empty-state"><p>暂无投资信号</p></div>'; return; }
  const maxCount = Math.max.apply(null, signals.map(function(s) { return s.count; }));
  el.innerHTML = signals.map(function(s) {
    var pct = Math.round(s.count / maxCount * 100);
    return '<div class="signal-bar-item"><div class="signal-bar-header"><span class="signal-bar-name">' + escHtml(s.emoji) + ' ' + escHtml(s.category) + '</span><span class="signal-bar-count">' + s.count + ' 条</span></div><div class="signal-bar-track"><div class="signal-bar-fill" style="width:' + pct + '%;background:' + (s.color||'#3b82f6') + ';"></div></div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════
// SECTOR HEATMAP
// ═══════════════════════════════════════════════
function renderSectorHeatmap(heatmapData) {
  var el = document.getElementById('sectorHeatmap');
  if (!heatmapData || !heatmapData.sectors || !heatmapData.sectors.length) {
    el.innerHTML = '<div class="empty-state"><p>暂无板块影响数据</p></div>';
    return;
  }
  var sectors = heatmapData.sectors, hAccounts = heatmapData.accounts, matrix = heatmapData.matrix;
  var maxAbs = 0;
  matrix.forEach(function(row) { row.forEach(function(v) { if (Math.abs(v) > maxAbs) maxAbs = Math.abs(v); }); });
  if (maxAbs === 0) maxAbs = 1;

  function cellStyle(val) {
    if (Math.abs(val) < 0.3) return {bg: 'transparent', color: '#4d5770'};
    var ratio = Math.min(Math.abs(val) / maxAbs, 1);
    if (val > 0) return {bg: 'rgba(239,68,68,' + (0.08 + ratio*0.5).toFixed(2) + ')', color: '#ef4444'};
    return {bg: 'rgba(34,197,94,' + (0.08 + ratio*0.5).toFixed(2) + ')', color: '#22c55e'};
  }

  var html = '<table><thead><tr><th>板块</th>';
  hAccounts.forEach(function(a) { html += '<th>@' + escHtml(a) + '</th>'; });
  html += '</tr></thead><tbody>';
  sectors.forEach(function(sec, i) {
    html += '<tr><td>' + escHtml(sec.emoji) + ' ' + escHtml(sec.name) + '</td>';
    hAccounts.forEach(function(acc, j) {
      var val = matrix[i][j], cs = cellStyle(val);
      var txt = val === 0 ? '--' : (val > 0 ? '+' + val.toFixed(1) : val.toFixed(1));
      html += '<td><span class="heat-cell" style="background:' + cs.bg + ';color:' + cs.color + ';border-color:' + cs.color + '22;">' + txt + '</span></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// TWEET LIST
// ═══════════════════════════════════════════════
function renderTweets(tweets) {
  var el = document.getElementById('tweetList');
  if (!tweets.length) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">○</span><p>该日期暂无推文</p></div>'; return; }
  var sentMap = {positive:'👍', negative:'👎', neutral:'➖'};
  var avatarColors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4'];
  var avatarMap = {}, colorIdx = 0;
  tweets.forEach(function(t) { if (!avatarMap[t.username]) { avatarMap[t.username] = avatarColors[colorIdx++ % avatarColors.length]; } });

  el.innerHTML = tweets.map(function(t) {
    var hasHighSignal = t.signals && t.signals.length > 0;
    var signalTags = (t.signals||[]).slice(0,3).map(function(s) {
      return '<span class="tag tag-signal" style="background:' + s.color + '15;color:' + s.color + ';border-color:' + s.color + '33;">' + escHtml(s.emoji) + ' ' + escHtml(s.category) + '</span>';
    }).join('');
    var sectorTags = (t.sectors||[]).slice(0,3).map(function(s) {
      var dc = s.direction==='bullish'?'#ef4444':s.direction==='bearish'?'#22c55e':'#888';
      var di = s.direction==='bullish'?'↑':s.direction==='bearish'?'↓':'·';
      return '<span class="tag tag-sector" style="color:' + dc + ';border-color:' + dc + '33;background:' + dc + '0d;">' + escHtml(s.emoji) + ' ' + escHtml(s.sector) + ' ' + di + '</span>';
    }).join('');
    return '<div class="tweet-card' + (hasHighSignal?' signal-high':'') + '" id="tweet-' + escAttr(t.tweet_id) + '">'
      + '<div class="tweet-meta">'
      + '<span class="tweet-account"><span class="tweet-account-avatar" style="background:' + (avatarMap[t.username]||'#888') + ';">' + escHtml(t.username[0].toUpperCase()) + '</span>@' + escHtml(t.username) + '</span>'
      + '<span class="tweet-sentiment">' + (sentMap[t.sentiment]||'') + '</span>'
      + '<span class="tweet-time">' + escHtml(t.pub_date || t.first_seen || '') + '</span>'
      + '</div>'
      + '<div class="tweet-content-en">' + escHtml(t.content) + '</div>'
      + (showZh ? '<div class="tweet-content-zh" id="zh-' + t.tweet_id + '"><em style="opacity:0.4;">翻译中...</em></div>' : '')
      + (signalTags ? '<div class="tweet-tags">' + signalTags + '</div>' : '')
      + (sectorTags ? '<div class="tweet-tags">' + sectorTags + '</div>' : '')
      + (t.interpretation ? '<div class="tweet-interpretation">' + escHtml(t.interpretation) + '</div>' : '')
      + (t.link ? '<div class="tweet-link"><a href="' + escHtml(t.link) + '" target="_blank">↗ 查看原文</a></div>' : '')
      + '</div>';
  }).join('');

  if (showZh) { tweets.forEach(function(t) { translateTweet(t.tweet_id, t.content); }); }
}

async function translateTweet(id, text) {
  try { const r = await fetch('/api/translate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}); const d = await r.json(); const el = document.getElementById('zh-'+id); if (el) el.textContent = d.translated || '[翻译失败]'; }
  catch(e) { const el = document.getElementById('zh-'+id); if (el) el.textContent = '[翻译失败]'; }
}

function toggleTranslation() {
  showZh = !showZh;
  document.getElementById('btnTranslate').textContent = showZh ? '文A' : 'EN';
  if (currentData && currentData.tweets) renderTweets(currentData.tweets);
}

// ═══════════════════════════════════════════════
// RISKS
// ═══════════════════════════════════════════════
function renderRisks(risks) {
  var el = document.getElementById('riskPanel');
  if (!risks.length) { el.innerHTML = '<div class="risk-safe"><span class="safe-icon">✓</span>暂无明显风险信号</div>'; return; }
  el.innerHTML = risks.map(function(r) {
    return '<div class="risk-item" onclick="scrollToTweet(\'' + escHtml(r.tweet_id || '') + '\')" title="点击查看推文详情">'
      + '<div class="risk-pulse"></div>'
      + '<div class="risk-source">' + escHtml(r.source) + ' → ' + escHtml(r.keyword) + '<span class="risk-link-icon">↗</span></div>'
      + '<div class="risk-excerpt">' + escHtml(r.excerpt) + '</div>'
      + '</div>';
  }).join('');
}

function scrollToTweet(tweetId) {
  if (!tweetId) return;
  if (currentView !== 'dashboard') {
    switchView('dashboard', document.querySelector('[data-view="dashboard"]'));
    setTimeout(function() { doScroll(tweetId); }, 400);
  } else { doScroll(tweetId); }
}
function doScroll(tweetId) {
  var card = document.getElementById('tweet-' + tweetId);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  card.classList.add('flash');
  setTimeout(function() { card.classList.remove('flash'); }, 3000);
}

// ═══════════════════════════════════════════════
// PATTERNS
// ═══════════════════════════════════════════════
var loadedPatterns = false;
async function loadPatterns() {
  if (loadedPatterns) return;
  var el = document.getElementById('patternGrid');
  el.innerHTML = '<div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载格局数据...</div></div>';
  try { const r = await fetch('/api/patterns?days=14'); const data = await r.json();
    if (data.error) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>' + escHtml(data.error) + '</p></div>'; return; }
    renderPatterns(data); loadedPatterns = true;
  } catch(e) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>加载失败</p></div>'; }
}

function renderPatterns(data) {
  var el = document.getElementById('patternGrid');
  var dims = ['sino_us','fed_policy','crypto','ai_race'];
  var trendIcons = {escalating:'↑ 紧张',improving:'↓ 缓和',stable:'→ 持平',neutral:'→ 持平'};
  el.innerHTML = dims.map(function(key) {
    var d = data[key]; if (!d) return '';
    var score = d.avg_sentiment || 0, absScore = Math.abs(score);
    var pct = Math.min(absScore / 3 * 100, 100);
    var meterColor = score > 0.3 ? '#ef4444' : (score < -0.3 ? '#22c55e' : '#6b7084');
    var scoreColor = score > 0.5 ? '#ef4444' : (score < -0.5 ? '#22c55e' : '#8892a8');
    var events = (d.recent_key_events || []).slice(0, 3);
    return '<div class="pattern-card">'
      + '<div class="pattern-card-header"><div class="pattern-card-title">' + escHtml(d.emoji) + ' ' + escHtml(d.name) + '</div><div class="pattern-card-period">' + (d.period_days||14) + 'd</div></div>'
      + '<div class="pattern-score" style="color:' + scoreColor + ';">' + (score>0?'+':'') + score.toFixed(2) + '</div>'
      + '<div class="pattern-status-text" style="color:' + meterColor + ';">' + escHtml(d.status||'中性') + '</div>'
      + '<div class="pattern-trend-text">趋势: ' + (trendIcons[d.trend_direction]||d.trend_direction||'--') + ' | ' + ((d.trend_change_pct||0)>0?'+':'') + (d.trend_change_pct||0) + '%</div>'
      + '<div class="pattern-gauge"><div class="pattern-gauge-fill" style="width:' + pct + '%;background:' + meterColor + ';"></div></div>'
      + '<div style="font-size:11px;color:var(--text-muted);">' + (d.total_signals||0) + ' 条信号</div>'
      + (events.length ? '<div class="pattern-events">' + events.map(function(e) {
        return '<div class="pattern-event"><span class="pe-date">' + escHtml(e.date) + '</span> <span class="pe-source">' + escHtml(e.source) + '</span>: ' + escHtml(e.excerpt||'') + '</div>';
      }).join('') + '</div>' : '')
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════
// PROFILES
// ═══════════════════════════════════════════════
var loadedProfileData = false;
async function loadProfiles() {
  if (loadedProfileData) return;
  var el = document.getElementById('profileGrid');
  el.innerHTML = '<div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">加载账号画像...</div></div>';
  try { const r = await fetch('/api/profiles?days=30'); const data = await r.json();
    if (data.error) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>' + escHtml(data.error) + '</p></div>'; return; }
    renderProfiles(data); loadedProfileData = true;
  } catch(e) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>加载失败</p></div>'; }
}

function renderProfiles(data) {
  var el = document.getElementById('profileGrid');
  var avatarColors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4'];
  var barColors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4'];
  el.innerHTML = Object.entries(data).map(function(entry, i) {
    var username = entry[0], p = entry[1];
    if (p.error) return '<div class="profile-card"><div class="profile-top"><div class="profile-avatar" style="background:var(--text-muted);">?</div><div><div class="profile-name">@' + escHtml(username) + '</div><div class="profile-handle">暂无数据</div></div></div></div>';
    var domains = p.domains || {};
    var topDomains = Object.entries(domains).sort(function(a,b) { return b[1].pct - a[1].pct; }).slice(0, 5);
    return '<div class="profile-card">'
      + '<div class="profile-top">'
      + '<div class="profile-avatar" style="background:' + (avatarColors[i%avatarColors.length]) + ';">' + escHtml(username[0].toUpperCase()) + '</div>'
      + '<div><div class="profile-name">@' + escHtml(username) + '</div><div class="profile-handle">情报源 #' + (i+1) + '</div></div>'
      + '</div>'
      + '<div class="profile-stats-row"><span>📊 ' + (p.total_tweets||0) + '条</span><span>📅 ' + (p.active_days||0) + '/' + (p.period_days||30) + 'd</span><span>⚡日均' + (p.daily_avg||0) + '</span></div>'
      + topDomains.map(function(d, di) {
        var dk = d[0], dv = d[1];
        return '<div class="profile-domain"><div class="profile-domain-label"><span>' + escHtml(dv.emoji) + ' ' + escHtml(dv.name) + '</span><span>' + dv.pct + '%</span></div><div class="profile-domain-bar"><div class="profile-domain-fill" style="width:' + dv.pct + '%;background:' + (barColors[di%barColors.length]) + ';"></div></div></div>';
      }).join('')
      + '<div class="profile-stance" style="background:' + ((p.china_stance?.score||0)>0?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)') + ';color:' + ((p.china_stance?.score||0)>0?'#22c55e':'#ef4444') + ';">对华态度: ' + escHtml(p.china_stance?.label||'?') + ' (' + (p.china_stance?.mentions||0) + '条)</div>'
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════
// RESONANCE
// ═══════════════════════════════════════════════
var loadedResonanceData = false;
async function loadResonance() {
  if (loadedResonanceData) return;
  var el = document.getElementById('resonancePanel');
  el.innerHTML = '<div class="loading-center"><div class="loading-spinner"></div><div class="loading-text">分析主题共振...</div></div>';
  try { const r = await fetch('/api/resonance?days=7'); const data = await r.json();
    if (data.error) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>' + escHtml(data.error) + '</p></div>'; return; }
    renderResonance(data); loadedResonanceData = true;
  } catch(e) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">!</span><p>加载失败</p></div>'; }
}

function renderResonance(data) {
  var el = document.getElementById('resonancePanel');
  var themes = data.themes || [];
  if (!themes.length) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">◎</span><p>过去7天内未发现跨账号共振话题</p></div>'; return; }
  var labels = {strong:'强共振',medium:'中',weak:'弱'};
  el.innerHTML = '<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">过去 ' + (data.period_days||7) + ' 天，' + themes.length + ' 个话题被多人同时提及</div>'
    + themes.map(function(t) {
    return '<div class="resonance-item ' + (t.strength||'weak') + '">'
      + '<div class="resonance-top">'
      + '<div class="resonance-topic-name">' + escHtml(t.emoji) + ' ' + escHtml(t.name) + ' <span class="resonance-badge ' + (t.strength||'weak') + '">' + (labels[t.strength]||t.strength) + '</span></div>'
      + '<span style="font-size:12px;color:var(--text-muted);">' + (t.tweet_count||0) + '条</span>'
      + '</div>'
      + '<div class="resonance-accounts">' + (t.accounts||[]).map(function(a) { return '<span class="resonance-acc-chip">@' + escHtml(a) + '</span>'; }).join('') + '<span style="font-size:11px;color:var(--text-muted);margin-left:4px;">' + (t.account_count||0) + '人共同关注</span></div>'
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════
// ACCOUNT MANAGER
// ═══════════════════════════════════════════════
function openAccountManager() { document.getElementById('accountModal').classList.add('show'); renderAccountList(); }
function closeAccountManager() { document.getElementById('accountModal').classList.remove('show'); }
function renderAccountList() {
  document.getElementById('accountList').innerHTML = accounts.map(function(a) {
    return '<div class="acc-list-item"><span>@' + escHtml(a) + '</span><button class="acc-del" onclick="removeAccount(\'' + escHtml(a) + '\')">×</button></div>';
  }).join('') || '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">暂无账号</div>';
}
async function addAccount() {
  var input = document.getElementById('newAccount'), name = input.value.trim();
  if (!name) return;
  try { const r = await fetch('/api/accounts', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:name})});
    if (r.ok) { await loadAccounts(); renderAccountList(); input.value = ''; refreshAll(); toast('已添加 @' + name, 'success'); }
    else { const d = await r.json(); toast(d.error || '添加失败', 'error'); }
  } catch(e) { toast('网络错误', 'error'); }
}
async function removeAccount(name) {
  if (!confirm('确定删除 @' + name + '？')) return;
  try { const r = await fetch('/api/accounts', {method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:name})});
    if (r.ok) { await loadAccounts(); renderAccountList(); refreshAll(); toast('已删除 @' + name, 'success'); }
  } catch(e) { toast('删除失败', 'error'); }
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(msg, type) {
  var c = document.getElementById('toastContainer'), t = document.createElement('div');
  t.className = 'toast ' + (type||'success'); t.textContent = msg; c.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(function() { t.remove(); }, 300); }, 2500);
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return String(s).replace(/[<>\"'&]/g, ''); }
</script>
